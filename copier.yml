---

package_name:
  type: str
  help: The name of the python package for this repository.
  default: "{{ _copier_conf.dst_path.name }}"
  when: false

package_dir:
  type: str
  help: The name of the python package directory for this repository.
  default: "{{ _copier_conf.dst_path.name.replace('-', '_') }}"
  when: false

device_name:
  type: str
  help: The name of the device this repository will simulate.
  default: "{{ package_name.split('-') | last }}"
  validator: "{% if not package_name.startswith('virtual-') %}Target directory name must be the device name prefixed with 'virtual-', ex: 'virtual-pilatus3'{% endif %}"

author_name:
  type: str
  help: The name of the author of this repository.
  validator: "{% if ' ' not in author_name.strip() %}Author name must contain at least a first and last name{% endif %}"

author_email:
  type: str
  help: The email of the author of this repository.
  default: "{{ author_name.split(' ') | first | first | lower }}{{ author_name.split(' ') | last | lower }}@bnl.gov"

control_api:
  type: str
  choices:
    - http
    - socket
    - zmq

readout_api:
  type: str
  choices:
    - http
    - socket
    - zmq
