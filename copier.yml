---

package_name:
  type: str
  help: The name of the python package for this repository.
  default: "{{ _copier_conf.dst_path.name }}"
  when: false
  validator: "{% if not value.startswith('virtual-') %}Target directory name must be the device name prefixed with `virtual-`{% endif %}"

package_dir:
  type: str
  help: The name of the python package directory for this repository.
  default: "{{ _copier_conf.dst_path.name.replace('-', '_') }}"
  when: false

device_name:
  type: str
  help: The name of the device this repository will simulate.
  default: "{{ _copier_conf.dst_path.name.split('-') | last }}"

author_name:
  type: str
  help: The name of the author of this repository.

author_email:
  type: str
  help: The email of the author of this repository.

control_api:
  type: str
  choices:
    - http
    - socket
    - zmq

readout_api:
  type: str
  choices:
    - http
    - socket
    - zmq
